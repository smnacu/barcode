<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Daruma Scanner</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Login Overlay Specifics */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-body);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }
    </style>
</head>

<body>

    <!-- Overlay de Login -->
    <div id="login-overlay">
        <div class="login-box">
            <img src="img/logo_bw.png" alt="Logo"
                style="height: 60px; margin-bottom: 20px; filter: invert(1) brightness(0);">
            <!-- Note: filter added to ensure logo is black in light mode, logic might need adjustment for dark mode if logo is transparent png -->
            <h2 style="margin-bottom: 10px;">Acceso Restringido</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Panel de Administración</p>

            <div class="input-group">
                <input type="password" id="admin-pass" placeholder="Contraseña de Administrador">
            </div>

            <button onclick="doLogin()" class="btn btn-primary btn-lg">ENTRAR</button>
            <p id="login-error" style="color: var(--error); margin-top: 15px; display: none;"><i
                    class="fa fa-exclamation-circle"></i> Clave incorrecta</p>

            <a href="index.html" style="display:block; margin-top: 25px; color: var(--text-muted); font-size: 0.9rem;">
                <i class="fa fa-arrow-left"></i> Volver al Scanner
            </a>
        </div>
    </div>

    <!-- Contenido Admin (Oculto hasta loguear) -->
    <div id="admin-content" class="hidden">

        <header class="app-header">
            <div class="logo-container">
                <img src="img/logo_bw.png" alt="Logo" class="logo">
                <div class="app-title">Daruma <span>Admin</span></div>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary btn-sm"><i class="fa fa-qrcode"></i> Scanner</a>
                <button onclick="doLogout()" class="btn btn-primary btn-sm"><i class="fa fa-sign-out-alt"></i>
                    Salir</button>
            </div>
        </header>

        <div class="container">

            <!-- Configuración General -->
            <section class="admin-toolbar">
                <div class="input-group" style="flex: 2;">
                    <label><i class="fa fa-folder-open"></i> Ruta PDFs (Server/Intranet)</label>
                    <input type="text" id="config-pdf-path" placeholder="Ej: ../Pdf/">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label><i class="fa fa-database"></i> BD Activa (Producción)</label>
                    <select id="config-csv-active" onchange="highlightChange()"></select>
                </div>
                <div class="input-group" style="flex: 0;">
                    <label>&nbsp;</label>
                    <button onclick="saveConfiguration()" class="btn btn-primary"><i class="fa fa-save"></i>
                        Guardar</button>
                </div>
            </section>

            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px;">
                <!-- Editor Selector -->
                <section class="card" style="margin:0;">
                    <h3 style="margin-bottom: 15px; font-size: 1.1rem;"><i class="fa fa-edit"></i> Editor de Datos</h3>
                    <div style="display: flex; gap: 10px; align-items: flex-end;">
                        <div class="input-group" style="flex: 1; margin:0;">
                            <label>Seleccionar Archivo</label>
                            <select id="editor-csv-select" onchange="loadData()"></select>
                        </div>
                        <button onclick="loadData()" class="btn btn-secondary"><i class="fa fa-sync"></i></button>
                    </div>
                </section>

                <!-- Subida -->
                <section class="card" style="margin:0;">
                    <h3 style="margin-bottom: 15px; font-size: 1.1rem;"><i class="fa fa-cloud-upload-alt"></i> Subir CSV
                    </h3>
                    <div style="display: flex; gap: 10px; align-items: flex-end;">
                        <div class="input-group" style="flex: 1; margin:0;">
                            <label>Archivo Local (.csv)</label>
                            <input type="file" id="csv-upload" accept=".csv" style="padding: 9px;">
                        </div>
                        <button onclick="uploadCSV()" class="btn btn-secondary">Subir</button>
                    </div>
                </section>
            </div>

            <!-- Tabla -->
            <div class="data-table-wrapper">
                <div
                    style="padding: 15px; background: var(--bg-header); display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="color: white; margin: 0; font-size: 1rem;" id="table-title">Datos</h3>
                    <button onclick="addRow()" class="btn btn-primary btn-sm"><i class="fa fa-plus"></i> Nueva
                        Fila</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table" id="csv-table">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'api/admin.php';
        let currentEditingFile = '';

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();

            // Permitir Enter en login
            document.getElementById('admin-pass').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') doLogin();
            });
        });

        // --- SEGURIDAD ---
        function checkAuth() {
            const fd = new FormData();
            fd.append('action', 'check_auth');
            fetch(API, { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.auth) {
                        showAdmin();
                    }
                });
        }

        function doLogin() {
            const pass = document.getElementById('admin-pass').value;
            const fd = new FormData();
            fd.append('action', 'login');
            fd.append('password', pass);

            fetch(API, { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'ok') {
                        showAdmin();
                    } else {
                        document.getElementById('login-error').style.display = 'block';
                    }
                });
        }

        function doLogout() {
            const fd = new FormData();
            fd.append('action', 'logout');
            fetch(API, { method: 'POST', body: fd })
                .then(() => location.reload());
        }

        function showAdmin() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            loadConfig();
        }

        // --- LÓGICA DE ADMIN ---

        function loadConfig() {
            const formData = new FormData();
            formData.append('action', 'get_config');
            fetch(API, { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    // Llenar inputs
                    document.getElementById('config-pdf-path').value = data.config.pdf_path;

                    // Llenar Selectores (El de Config Activa y el de Editor)
                    const selActive = document.getElementById('config-csv-active');
                    const selEditor = document.getElementById('editor-csv-select');

                    selActive.innerHTML = '';
                    selEditor.innerHTML = '';

                    data.csv_files.forEach(f => {
                        // Selector de Configuración
                        const opt1 = document.createElement('option');
                        opt1.value = f;
                        opt1.innerText = f;
                        if (f === data.config.active_csv) opt1.selected = true;
                        selActive.appendChild(opt1);

                        // Selector de Editor (por defecto selecciona el activo también)
                        const opt2 = document.createElement('option');
                        opt2.value = f;
                        opt2.innerText = f;
                        if (f === data.config.active_csv && currentEditingFile === '') opt2.selected = true;
                        selEditor.appendChild(opt2);
                    });

                    // Cargar datos en la tabla (del archivo seleccionado en el editor)
                    if (currentEditingFile === '') {
                        currentEditingFile = data.config.active_csv;
                    }
                    loadData();
                });
        }

        function saveConfiguration() {
            const formData = new FormData();
            formData.append('action', 'save_config');
            formData.append('pdf_path', document.getElementById('config-pdf-path').value);
            formData.append('active_csv', document.getElementById('config-csv-active').value);

            fetch(API, { method: 'POST', body: formData })
                .then(r => r.json())
                .then(d => {
                    if (d.status === 'ok') {
                        alert('Configuración guardada correctamente.');
                    }
                });
        }

        function loadData() {
            // Actualizar archivo actual basado en el selector del editor
            currentEditingFile = document.getElementById('editor-csv-select').value;
            document.getElementById('table-title').innerText = 'Editando: ' + currentEditingFile;

            const formData = new FormData();
            formData.append('action', 'get_data');
            formData.append('target_csv', currentEditingFile);

            fetch(API, { method: 'POST', body: formData })
                .then(r => r.json())
                .then(res => {
                    renderTable(res.data);
                });
        }

        function highlightChange() {
            document.getElementById('config-csv-active').style.borderColor = "var(--warning)";
        }

        // --- MANEJO DE TABLA (Igual que antes pero apunta a currentEditingFile) ---
        function renderTable(rows) {
            const table = document.getElementById('csv-table');
            table.innerHTML = '';

            if (!rows || rows.length === 0) {
                table.innerHTML = '<tbody><tr><td style="text-align:center; padding: 20px;">Archivo vacío o no encontrado</td></tr></tbody>';
                return;
            }

            const thead = document.createElement('thead');
            const trHead = document.createElement('tr');
            rows[0].forEach((_, i) => {
                const th = document.createElement('th');
                th.innerText = i === 0 ? 'CÓDIGO (Key)' : `Columna ${i}`;
                trHead.appendChild(th);
            });
            const thAct = document.createElement('th');
            thAct.innerText = 'Acciones';
            thAct.style.width = '50px';
            trHead.appendChild(thAct);
            thead.appendChild(trHead);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            rows.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                row.forEach((cell, cellIndex) => {
                    const td = document.createElement('td');
                    td.innerText = cell;
                    td.contentEditable = true;
                    td.onblur = () => saveCell(rowIndex, cellIndex, td.innerText, row);
                    tr.appendChild(td);
                });

                const tdAct = document.createElement('td');
                const btnDel = document.createElement('button');
                btnDel.innerHTML = '<i class="fa fa-trash"></i>';
                btnDel.className = 'btn btn-sm';
                btnDel.style.background = 'var(--error)';
                btnDel.style.color = 'white';
                btnDel.onclick = () => deleteRow(rowIndex);
                tdAct.appendChild(btnDel);
                tr.appendChild(tdAct);

                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
        }

        function saveCell(rowIndex, colIndex, value, originalRow) {
            originalRow[colIndex] = value;
            const fd = new FormData();
            fd.append('action', 'update_row');
            fd.append('target_csv', currentEditingFile);
            fd.append('index', rowIndex);
            originalRow.forEach((val, i) => fd.append(`row_data[${i}]`, val));
            fetch(API, { method: 'POST', body: fd });
        }

        function addRow() {
            const table = document.getElementById('csv-table');
            const cols = table.rows.length > 0 ? table.rows[0].cells.length - 1 : 1;
            const emptyRow = new Array(cols).fill("...");

            const fd = new FormData();
            fd.append('action', 'add_row');
            fd.append('target_csv', currentEditingFile);
            emptyRow.forEach((val, i) => fd.append(`row_data[${i}]`, val));

            fetch(API, { method: 'POST', body: fd }).then(() => loadData());
        }

        function deleteRow(index) {
            if (!confirm('¿Borrar fila?')) return;
            const fd = new FormData();
            fd.append('action', 'delete_row');
            fd.append('target_csv', currentEditingFile);
            fd.append('index', index);
            fetch(API, { method: 'POST', body: fd }).then(() => loadData());
        }

        function uploadCSV() {
            const fileInput = document.getElementById('csv-upload');
            if (fileInput.files.length === 0) return;

            const fd = new FormData();
            fd.append('action', 'upload_csv');
            fd.append('file', fileInput.files[0]);

            fetch(API, { method: 'POST', body: fd })
                .then(r => r.json())
                .then(d => {
                    if (d.status === 'ok') {
                        alert('Archivo subido');
                        loadConfig();
                    } else {
                        alert('Error: ' + d.message);
                    }
                });
        }
    </script>
</body>

</html>
