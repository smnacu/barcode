<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - Daruma</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="app-header">
        <div class="logo-container">
            <img src="img/logo_bw.png" alt="Logo" class="logo">
            <div class="app-title">Daruma <span>Scanner</span></div>
        </div>
        <div class="header-actions">
            <div id="status-bar" class="status-info" style="font-size: 0.8rem; color: var(--success);">Online</div>
            <a href="admin.html" class="settings-link"><i class="fa fa-cog"></i></a>
        </div>
    </header>

    <div class="scanner-layout">

        <!-- Search Manual Area -->
        <div class="search-bar-wrapper">
            <i class="fa fa-search" style="padding: 12px; color: var(--text-muted);"></i>
            <input type="text" id="manual-search-input" placeholder="Buscar código o descripción..."
                style="flex:1; border:none; background:transparent; padding:10px;">
            <button id="btn-manual-search" class="btn btn-primary btn-sm">IR</button>
        </div>

        <!-- Scanner Area -->
        <main id="scanner-container" class="mt-20" style="position: relative;">
            <div id="reader"></div>

            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 10px;">
                <button id="btn-switch-cam" class="btn btn-secondary btn-icon" title="Cambiar Cámara">
                    <i class="fa fa-sync"></i>
                </button>
                <p class="instruction" style="margin: 0; align-self: center;"><i class="fa fa-camera"></i> Apunte al
                    código</p>
            </div>
        </main>

        <!-- Result Area (Oculto por defecto) -->
        <main id="result-panel" class="result-view hidden mt-20">
            <div class="card">
                <div id="info-content"></div>

                <div style="display: grid; gap: 10px; margin-top: 20px;">
                    <button id="btn-open-pdf" class="btn btn-primary btn-lg">
                        <i class="fa fa-file-pdf"></i> VER DOCUMENTO
                    </button>
                    <button id="btn-reset" class="btn btn-secondary btn-lg">
                        <i class="fa fa-redo"></i> NUEVA BÚSQUEDA
                    </button>
                </div>

                <div id="pdf-container" class="mt-20 text-center"></div>
            </div>
        </main>

        <!-- Historial -->
        <section id="history-section" class="history-section">
            <div class="history-header">
                <h3><i class="fa fa-history"></i> Recientes</h3>
                <button onclick="clearHistory()" class="btn btn-sm btn-secondary"
                    style="font-size: 0.7rem;">Borrar</button>
            </div>
            <div id="history-list" class="history-list">
                <!-- Se llena con JS -->
                <p class="text-muted text-center">Sin historial reciente.</p>
            </div>
        </section>

    </div>

    <!-- PDF Modal Overlay -->
    <div id="pdf-modal" class="modal hidden">
        <div class="modal-header">
            <span>Visualizador Daruma</span>
            <button id="btn-close-pdf" class="btn-close"><i class="fa fa-times"></i></button>
        </div>
        <div class="modal-body">
            <iframe id="pdf-iframe" src="about:blank"></iframe>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/libs/html5-qrcode.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('js/sw.js');
        }
    </script>
</body>

</html>
